server {
    listen 80;
    server_name api.clinic.mrsinghdev.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name api.clinic.mrsinghdev.com;

    ssl_certificate /etc/letsencrypt/live/api.clinic.mrsinghdev.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.clinic.mrsinghdev.com/privkey.pem;

    root /var/www/meraclinic/backend/public;
    index index.php index.html;

    client_max_body_size 20M;

    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location ~ \.php$ {
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_index index.php;
        fastcgi_pass unix:/var/run/php/php8.3-fpm.sock;
    }

    location ~* \.(jpg|jpeg|png|gif|webp|svg|ico|css|js)$ {
        expires 7d;
        access_log off;
        try_files $uri $uri/ /index.php?$query_string;
    }
}
